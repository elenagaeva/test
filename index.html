<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
      background: #0f0c29;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        -45deg,
        #0f0c29,
        #302b63,
        #24243e,
        #6a3093,
        #a044ff,
        #fc5c7d,
        #6a82fb
      );
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }

    .bg::before,
    .bg::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: float 8s ease-in-out infinite;
    }

    .bg::before {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, #a044ff, transparent 70%);
      top: -10%;
      left: -5%;
      animation-delay: 0s;
    }

    .bg::after {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #fc5c7d, transparent 70%);
      bottom: -15%;
      right: -10%;
      animation-delay: -4s;
      animation-duration: 10s;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(106, 130, 251, 0.5);
      top: 40%;
      left: 50%;
      animation: float 14s ease-in-out infinite reverse;
    }

    .orb-2 {
      width: 200px;
      height: 200px;
      background: rgba(160, 68, 255, 0.4);
      top: 20%;
      right: 20%;
      animation: float 9s ease-in-out infinite;
      animation-delay: -2s;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -40px) scale(1.05); }
      66%       { transform: translate(-20px, 20px) scale(0.95); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      padding: 3rem;
      max-width: 520px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 2rem;
      text-align: center;
      background: linear-gradient(
        90deg,
        #fff 0%,
        #e0c3fc 40%,
        #fff 60%,
        #f8b4d9 80%,
        #fff 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }

    ul {
      list-style: none;
    }

    li {
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-left: 4px solid #c084fc;
      color: rgba(255, 255, 255, 0.92);
      font-size: 1.05rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      cursor: default;
      animation: fadeUp 0.6s ease both;
    }

    li:nth-child(1) { animation-delay: 0.2s; }
    li:nth-child(2) { animation-delay: 0.35s; }
    li:nth-child(3) { animation-delay: 0.5s; }

    li:hover {
      transform: translateX(8px) scale(1.02);
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 24px rgba(160, 68, 255, 0.25);
      border-left-color: #f472b6;
    }

    li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>контент-план на неделю</li>
    </ul>
  </div>
</body>
</html>
